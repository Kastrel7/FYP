services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    hostname: prometheus
    networks:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    restart: unless-stopped
    
  cadvisor:
    image: ghcr.io/google/cadvisor:latest
    container_name: cadvisor
    hostname: cadvisor
    networks:
      - monitoring
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/lib/containerd/:/var/lib/containerd:ro
    devices:
      - /dev/kmsg:/dev/kmsg
    labels:
      org.label-schema.group: "monitoring"
    restart: unless-stopped
    
  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    hostname: node_exporter
    networks:
      - monitoring
    ports:
      - "9100:9100"
    command:
      - '--collector.processes'
    restart: unless-stopped
    
networks:
  monitoring:
    driver: bridge
